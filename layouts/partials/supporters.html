<section class="py-16 md:py-24">
  <div class="container">
    <div class="flex flex-col items-center gap-8">
      <div class="flex flex-col gap-y-2 items-center">
        <h5 class="font-bold">Generously supported by</h5>
        <hr style="width:200%" class="h-0.5 bg-slate-200" />
      </div>
      <div
        class="flex flex-wrap items-center justify-center gap-x-12 md:gap-x-16 gap-y-8 sm:gap-y-0"
      >
        {{ $logosLogo := resources.GetMatch "images/logos.svg" }}
        {{ with $logosLogo }}
          <a
            href="https://logos.co"
            target="_blank"
            rel="noopener noreferrer"
            class="opacity-100 hover:opacity-70 transition-opacity"
          >
            <img
              src="{{ .RelPermalink }}"
              alt="Logos"
              class="h-12 md:h-14 w-auto"
            />
          </a>
        {{ end }}
        {{ $golemLogo := resources.GetMatch "images/Golem_Logo_Positive_RGB.svg" }}
        {{ with $golemLogo }}
          <a
            href="https://golem.network"
            target="_blank"
            rel="noopener noreferrer"
            class="opacity-100 hover:opacity-70 transition-opacity"
          >
            <img
              src="{{ .RelPermalink }}"
              alt="Golem"
              class="h-16 md:h-18 w-auto"
            />
          </a>
        {{ end }}
        <hr style="width:200%" class="h-0.5 bg-slate-200 sm:mt-6" />
      </div>
    </div>
  </div>
</section>
